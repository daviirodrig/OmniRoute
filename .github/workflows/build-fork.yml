name: Publish Fork Image to GHCR

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

# Least-privilege default: read-only at the top level; the build job that pushes to
# GHCR grants packages: write itself (Scorecard TokenPermissions).
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/daviirodrig/omniroute

# The upstream Dockerfile uses shared apt caches (`--mount=type=cache,sharing=shared`),
# which can deadlock when two architectures compete for the same host-side mount via
# QEMU emulation. Build per platform in a matrix so each architecture gets its own
# isolated cache scope and Buildx instance. The merge job stitches the per-platform
# images into a single multi-arch manifest.
jobs:
  build:
    name: Build platform image (${{ matrix.platform }})
    if: github.repository == 'daviirodrig/OmniRoute'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha,scope=docker-fork-${{ matrix.arch }}
          cache-to: type=gha,scope=docker-fork-${{ matrix.arch }},mode=max
          no-cache: false
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Create multi-arch manifest
    needs: build
    if: github.repository == 'daviirodrig/OmniRoute'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Inspect downloaded digests
        run: |
          set -euo pipefail
          ls -la /tmp/digests
          for f in /tmp/digests/*; do
            echo "digest: $(basename "$f")"
          done

      - name: Compute tag list
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            VERSION="${REF_NAME#v}"
            TAGS="$VERSION sha-$VERSION"
            PROMOTE="false"
          else
            VERSION="main"
            TAGS="main latest"
            PROMOTE="true"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "promote=$PROMOTE" >> "$GITHUB_OUTPUT"
          echo "Publishing $IMAGE_NAME with tags: $TAGS"

      - name: Create multi-arch manifest and tag release
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          if [ ! -d /tmp/digests ] || [ -z "$(ls -A /tmp/digests 2>/dev/null || true)" ]; then
            echo "No digests found, cannot build manifest" >&2
            exit 1
          fi

          mapfile -t DIGESTS < <(ls /tmp/digests)
          echo "Collected digests:"
          printf '  - %s\n' "${DIGESTS[@]}"

          # Build a multi-arch manifest list from every per-platform digest in a
          # single `imagetools create` invocation. Subsequent `imagetools create`
          # calls would replace the manifest instead of appending, so we always
          # pass every digest here. Any extra tags point at the same manifest
          # by reference, which is cheap and keeps every tag in sync.
          PRIMARY_TAG="$(echo "$TAGS" | awk '{print $1}')"
          PRIMARY_SRC=""
          for digest in "${DIGESTS[@]}"; do
            PRIMARY_SRC="$PRIMARY_SRC ${{ env.IMAGE_NAME }}@sha256:${digest}"
          done

          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:$PRIMARY_TAG" \
            $PRIMARY_SRC

          for tag in $TAGS; do
            [ "$tag" = "$PRIMARY_TAG" ] && continue
            docker buildx imagetools create \
              --tag "${{ env.IMAGE_NAME }}:$tag" \
              "${{ env.IMAGE_NAME }}:$PRIMARY_TAG"
          done
